# ===== ModelHub Nginx 配置 =====
# 放到 /etc/nginx/sites-available/modelhub.conf
# ln -s /etc/nginx/sites-available/modelhub.conf /etc/nginx/sites-enabled/

# 隐藏 Nginx 版本号
server_tokens off;

# 限流 zone（每 IP 10 请求/秒，10MB 共享内存）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# 连接数限制（每 IP 最多 50 并发）
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    listen [::]:80;
    server_name api.modelhub.cn;  # 替换为你的域名
    return 301 https://$server_name$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.modelhub.cn;  # 替换为你的域名

    # ===== SSL =====
    ssl_certificate     /etc/ssl/modelhub/cert.pem;
    ssl_certificate_key /etc/ssl/modelhub/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # ===== 安全响应头 =====
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "0" always;  # 现代浏览器推荐关闭旧 XSS filter，靠 CSP
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # CSP: NewAPI 前端需要 inline 样式和脚本，但限制到 self
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self'; frame-ancestors 'none';" always;

    # ===== 限流 =====
    limit_req zone=api_limit burst=30 nodelay;
    limit_conn conn_limit 50;

    # ===== 请求体限制 =====
    client_max_body_size 10m;

    # ===== 只允许必要的 HTTP 方法 =====
    if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS)$) {
        return 405;
    }

    # ===== API 转发到 NewAPI =====
    location / {
        proxy_pass http://127.0.0.1:3000;

        # 标准代理头
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # 隐藏后端版本头
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # SSE 流式响应支持（关键！）
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # 超时（AI 模型响应可能较慢）
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    300s;  # 5 分钟，支持长对话
    }

    # ===== 健康检查端点 =====
    location /health {
        proxy_pass http://127.0.0.1:3000/api/status;
        access_log off;
    }

    # ===== 屏蔽敏感路径 =====
    location ~ /\.(env|git|svn|htaccess|htpasswd|DS_Store) {
        deny all;
        return 404;
    }

    # 屏蔽常见扫描路径
    location ~* ^/(wp-admin|wp-login|phpmyadmin|admin\.php|xmlrpc\.php) {
        deny all;
        return 404;
    }

    # ===== 错误页 =====
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
